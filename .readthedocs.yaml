# .readthedocs.yaml
# Read the Docs configuration file for SPIMAG

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    post_checkout:
      - echo "⚛️ Building SPIMAG documentation"
      - git fetch --unshallow || true
    pre_build:
      - python scripts/generate_api_docs.py
      - python scripts/validate_parameters.py --docs

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: false

formats:
  - pdf
  - epub

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/requirements.txt

env:
  SPIMAG_VERSION: 1.0.0
  SMNI_DOCS_MODE: production
  DISPLAY_CLASSIFICATION_ACCURACY: "94.8"
  DISPLAY_COHERENCE_LIFETIME: "6.2"

search:
  ranking:
    api/*: 3
    parameters/*: 5
    research/*: 4
    parameters/s_yield/: 10
    parameters/gamma_coh/: 10
    research/case_studies/: 8
